<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>n8n Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #16161f;
    --border: #1e1e2e;
    --accent: #ff6b2b;
    --accent2: #ff9f5a;
    --green: #2bff8f;
    --red: #ff3b5c;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --card-glow: 0 0 40px rgba(255,107,43,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none;
    z-index:0;
    opacity:0.4;
  }

  /* Grid background */
  body::after {
    content:'';
    position:fixed;
    inset:0;
    background-image: linear-gradient(rgba(255,107,43,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,107,43,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none;
    z-index:0;
  }

  .container { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:0 32px; }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding: 24px 0;
    position: sticky;
    top: 0;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(20px);
    z-index: 100;
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 800;
    color: #000;
    font-family: 'Space Mono', monospace;
  }
  .logo-text {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--accent); }

  .header-stats {
    display: flex;
    gap: 32px;
    align-items: center;
  }
  .stat-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .stat-pill .num {
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
  }
  .dot { width:8px;height:8px;border-radius:50%; }
  .dot.active { background:var(--green); box-shadow: 0 0 8px var(--green); }
  .dot.inactive { background:var(--muted); }

  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn.spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Main layout */
  main { padding: 40px 0 80px; }

  /* Page title */
  .page-title {
    margin-bottom: 40px;
    animation: fadeUp 0.5s ease both;
  }
  .page-title h1 {
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 8px;
  }
  .page-title h1 em {
    font-style: normal;
    color: var(--accent);
  }
  .page-title p {
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
  }

  /* Search & Filter bar */
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    animation: fadeUp 0.5s 0.1s ease both;
  }
  .search-box {
    flex: 1;
    position: relative;
  }
  .search-box input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px 12px 44px;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    transition: border-color 0.2s;
    outline: none;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 12px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(255,107,43,0.05);
  }

  /* Stats row */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 40px;
    animation: fadeUp 0.5s 0.15s ease both;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .stat-card::before {
    content:'';
    position:absolute;
    top:-1px; left:0; right:0;
    height:2px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
  }
  .stat-card:hover { border-color: rgba(255,107,43,0.3); }
  .stat-card:hover::before { transform: scaleX(1); }
  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .stat-value {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--text);
  }
  .stat-value.green { color: var(--green); }
  .stat-value.orange { color: var(--accent); }

  /* Workflow grid */
  .workflows-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 20px;
  }

  .workflow-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s;
    animation: fadeUp 0.4s ease both;
    box-shadow: var(--card-glow);
    position: relative;
  }
  .workflow-card:hover {
    border-color: rgba(255,107,43,0.4);
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(255,107,43,0.1);
  }

  .card-header {
    padding: 20px 20px 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 1px solid var(--border);
  }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1.3;
    flex: 1;
    margin-right: 12px;
  }
  .status-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .status-badge.active {
    background: rgba(43,255,143,0.1);
    color: var(--green);
    border: 1px solid rgba(43,255,143,0.2);
  }
  .status-badge.inactive {
    background: rgba(107,107,128,0.1);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .card-body { padding: 16px 20px; }

  .card-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .meta-item { }
  .meta-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .meta-value {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  /* Node pills */
  .nodes-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .node-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    transition: all 0.15s;
  }
  .node-pill:hover {
    border-color: var(--accent);
    color: var(--accent2);
  }
  .node-pill.trigger {
    border-color: rgba(255,107,43,0.3);
    color: var(--accent2);
    background: rgba(255,107,43,0.05);
  }

  /* Card ID */
  .card-id {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--border);
    letter-spacing: 0.5px;
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-id span { color: var(--muted); }

  .open-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 3px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    text-decoration: none;
  }
  .open-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 80px;
    flex-direction: column;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
  }
  .loader {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  /* Error */
  .error-msg {
    background: rgba(255,59,92,0.08);
    border: 1px solid rgba(255,59,92,0.2);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    color: var(--red);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
  }

  /* Empty */
  .empty-state {
    text-align: center;
    padding: 80px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    max-width: 800px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    animation: scaleIn 0.2s ease;
  }
  @keyframes scaleIn {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .modal-header {
    padding: 28px 28px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    position: sticky;
    top: 0;
    background: var(--surface);
  }
  .modal-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .modal-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .modal-close:hover { border-color: var(--red); color: var(--red); }
  .modal-body { padding: 24px 28px; }

  .detail-section { margin-bottom: 28px; }
  .detail-section-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .detail-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .detail-item-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .detail-item-value {
    font-size: 14px;
    font-weight: 600;
    word-break: break-all;
  }

  /* Node list in modal */
  .node-list { display: flex; flex-direction: column; gap: 8px; }
  .node-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: border-color 0.15s;
  }
  .node-item:hover { border-color: rgba(255,107,43,0.3); }
  .node-name { font-size: 13px; font-weight: 600; }
  .node-type {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    max-width: 240px;
    text-align: right;
    word-break: break-all;
  }
  .node-type.is-trigger { color: var(--accent2); }

  /* Animations */
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }

  @media (max-width: 768px) {
    .container { padding: 0 16px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .workflows-grid { grid-template-columns: 1fr; }
    .header-stats { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">n8n</div>
        <div class="logo-text">n8n <span>Dashboard</span></div>
      </div>
      <div class="header-stats">
        <div class="stat-pill">
          <div class="dot active"></div>
          <span class="num" id="hdr-total">—</span>
          <span>workflows</span>
        </div>
        <div class="stat-pill">
          <div class="dot active"></div>
          <span class="num" id="hdr-active">—</span>
          <span>active</span>
        </div>
        <div class="stat-pill">
          <div class="dot inactive"></div>
          <span class="num" id="hdr-inactive">—</span>
          <span>inactive</span>
        </div>
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="loadWorkflows()">↺ REFRESH</button>
    </div>
  </div>
</header>

<main>
  <div class="container">
    <div class="page-title">
      <h1>Your <em>Workflows</em></h1>
      <p>// PERSONAL n8n CONTROL CENTER</p>
    </div>

    <div class="toolbar">
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Search workflows..." oninput="filterWorkflows()"/>
      </div>
      <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">ALL</button>
      <button class="filter-btn" id="filter-active" onclick="setFilter('active')">ACTIVE</button>
      <button class="filter-btn" id="filter-inactive" onclick="setFilter('inactive')">INACTIVE</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Workflows</div>
        <div class="stat-value orange" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active</div>
        <div class="stat-value green" id="stat-active">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Inactive</div>
        <div class="stat-value" id="stat-inactive">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Nodes</div>
        <div class="stat-value orange" id="stat-nodes">—</div>
      </div>
    </div>

    <div id="workflows-container">
      <div class="loading">
        <div class="loader"></div>
        <span>FETCHING WORKFLOWS...</span>
      </div>
    </div>
  </div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title"></div>
        <div style="margin-top:6px" id="modal-badge"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
  const API = 'http://localhost:5000';
  let allWorkflows = [];
  let currentFilter = 'all';

  async function loadWorkflows() {
    const btn = document.getElementById('refreshBtn');
    btn.textContent = '↺ LOADING';
    btn.style.opacity = '0.5';
    
    const container = document.getElementById('workflows-container');
    container.innerHTML = `<div class="loading"><div class="loader"></div><span>FETCHING WORKFLOWS...</span></div>`;

    try {
      const res = await fetch(`${API}/api/workflows`);
      const json = await res.json();
      allWorkflows = json.data || json || [];
      updateStats();
      renderWorkflows(allWorkflows);
    } catch(e) {
      container.innerHTML = `<div class="error-msg">⚠ Could not connect to Flask server at ${API}<br/><br/>Make sure <code>app.py</code> is running with <code>python app.py</code></div>`;
    }

    btn.textContent = '↺ REFRESH';
    btn.style.opacity = '1';
  }

  function updateStats() {
    const active = allWorkflows.filter(w => w.active).length;
    const inactive = allWorkflows.length - active;
    const totalNodes = allWorkflows.reduce((acc, w) => acc + (w.nodes ? w.nodes.length : 0), 0);

    document.getElementById('stat-total').textContent = allWorkflows.length;
    document.getElementById('stat-active').textContent = active;
    document.getElementById('stat-inactive').textContent = inactive;
    document.getElementById('stat-nodes').textContent = totalNodes;
    document.getElementById('hdr-total').textContent = allWorkflows.length;
    document.getElementById('hdr-active').textContent = active;
    document.getElementById('hdr-inactive').textContent = inactive;
  }

  function filterWorkflows() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    let filtered = allWorkflows;
    if (currentFilter === 'active') filtered = filtered.filter(w => w.active);
    if (currentFilter === 'inactive') filtered = filtered.filter(w => !w.active);
    if (q) filtered = filtered.filter(w => w.name.toLowerCase().includes(q));
    renderWorkflows(filtered);
  }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`filter-${f}`).classList.add('active');
    filterWorkflows();
  }

  function renderWorkflows(workflows) {
    const container = document.getElementById('workflows-container');
    if (!workflows.length) {
      container.innerHTML = `<div class="empty-state">No workflows found.</div>`;
      return;
    }

    container.innerHTML = `<div class="workflows-grid">${workflows.map((w, i) => cardHTML(w, i)).join('')}</div>`;
  }

  function cardHTML(w, i) {
    const nodes = w.nodes || [];
    const triggerNode = nodes.find(n => n.type && (n.type.includes('Trigger') || n.type.includes('trigger')));
    const delay = (i * 0.05).toFixed(2);

    const nodePills = nodes.slice(0, 5).map(n => {
      const label = n.name || n.type.split('.').pop();
      const isTrigger = n.type && (n.type.includes('Trigger') || n.type.includes('trigger'));
      return `<span class="node-pill ${isTrigger ? 'trigger' : ''}">${label}</span>`;
    }).join('');
    const more = nodes.length > 5 ? `<span class="node-pill">+${nodes.length - 5} more</span>` : '';

    const createdAt = w.createdAt ? new Date(w.createdAt).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) : '—';
    const updatedAt = w.updatedAt ? new Date(w.updatedAt).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) : '—';
    const triggerLabel = triggerNode ? triggerNode.type.split('.').pop().replace('Trigger','') : 'Manual';

    return `
    <div class="workflow-card" style="animation-delay:${delay}s" onclick="openModal('${w.id}')">
      <div class="card-header">
        <div class="card-title">${w.name}</div>
        <div class="status-badge ${w.active ? 'active' : 'inactive'}">
          <div class="dot ${w.active ? 'active' : 'inactive'}"></div>
          ${w.active ? 'ACTIVE' : 'INACTIVE'}
        </div>
      </div>
      <div class="card-body">
        <div class="card-meta">
          <div class="meta-item">
            <div class="meta-label">Nodes</div>
            <div class="meta-value">${nodes.length}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Trigger</div>
            <div class="meta-value">${triggerLabel}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Created</div>
            <div class="meta-value" style="font-size:12px">${createdAt}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Updated</div>
            <div class="meta-value" style="font-size:12px">${updatedAt}</div>
          </div>
        </div>
        ${nodes.length > 0 ? `<div class="nodes-row">${nodePills}${more}</div>` : ''}
      </div>
      <div class="card-id">
        <span>ID: ${w.id}</span>
        <span class="open-btn">VIEW DETAILS →</span>
      </div>
    </div>`;
  }

  async function openModal(id) {
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('modal-title').textContent = 'Loading...';
    document.getElementById('modal-badge').innerHTML = '';
    document.getElementById('modal-body').innerHTML = `<div class="loading"><div class="loader"></div></div>`;

    try {
      const res = await fetch(`${API}/api/workflows/${id}`);
      const w = await res.json();
      renderModal(w);
    } catch(e) {
      // Fall back to local data
      const w = allWorkflows.find(x => x.id === id);
      if (w) renderModal(w);
    }
  }

  function renderModal(w) {
    document.getElementById('modal-title').textContent = w.name;
    document.getElementById('modal-badge').innerHTML = `
      <div class="status-badge ${w.active ? 'active' : 'inactive'}" style="display:inline-flex">
        <div class="dot ${w.active ? 'active' : 'inactive'}"></div>
        ${w.active ? 'ACTIVE' : 'INACTIVE'}
      </div>`;

    const nodes = w.nodes || [];
    const connections = w.connections || {};
    const tags = w.tags || [];
    const settings = w.settings || {};

    const createdAt = w.createdAt ? new Date(w.createdAt).toLocaleString() : '—';
    const updatedAt = w.updatedAt ? new Date(w.updatedAt).toLocaleString() : '—';

    const nodeListHTML = nodes.map(n => {
      const isTrigger = n.type && (n.type.includes('Trigger') || n.type.includes('trigger'));
      return `<div class="node-item">
        <div class="node-name">${n.name}</div>
        <div class="node-type ${isTrigger ? 'is-trigger' : ''}">${n.type}</div>
      </div>`;
    }).join('');

    document.getElementById('modal-body').innerHTML = `
      <div class="detail-section">
        <div class="detail-section-title">// Overview</div>
        <div class="detail-grid">
          <div class="detail-item"><div class="detail-item-label">Workflow ID</div><div class="detail-item-value" style="font-family:'Space Mono',monospace;font-size:11px">${w.id}</div></div>
          <div class="detail-item"><div class="detail-item-label">Total Nodes</div><div class="detail-item-value">${nodes.length}</div></div>
          <div class="detail-item"><div class="detail-item-label">Created</div><div class="detail-item-value" style="font-size:12px">${createdAt}</div></div>
          <div class="detail-item"><div class="detail-item-label">Last Updated</div><div class="detail-item-value" style="font-size:12px">${updatedAt}</div></div>
          ${settings.timezone ? `<div class="detail-item"><div class="detail-item-label">Timezone</div><div class="detail-item-value">${settings.timezone}</div></div>` : ''}
          ${tags.length ? `<div class="detail-item"><div class="detail-item-label">Tags</div><div class="detail-item-value">${tags.map(t=>t.name||t).join(', ')}</div></div>` : ''}
        </div>
      </div>
      ${nodes.length > 0 ? `
      <div class="detail-section">
        <div class="detail-section-title">// Nodes (${nodes.length})</div>
        <div class="node-list">${nodeListHTML}</div>
      </div>` : ''}
    `;
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
  }
  function closeModalDirect() {
    document.getElementById('modalOverlay').classList.remove('open');
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

  loadWorkflows();
</script>
</body>
</html>
